services:
  - type: web
    name: fdc-fantatorneo-backend
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: CORS_ORIGINS
        value: https://fdcfanta.me,https://www.fdcfanta.me
      - key: SUPABASE_EMAIL_REDIRECT_TO
        value: https://fdcfanta.me/auth